<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Thread Tree Navigator - Legal Review</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        /* Top Navigator with Visualization */
        .top-navigator {
            background: white;
            border-bottom: 2px solid #e0e4e7;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 120px;
            max-height: 180px;
        }

        .nav-title {
            font-size: 20px;
            font-weight: 600;
            color: #24292f;
            margin-bottom: 4px;
        }

        .nav-subtitle {
            font-size: 12px;
            color: #656d76;
        }

        .visualization-container {
            flex: 1;
            margin: 0 20px;
            height: 80px;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            background: #f6f8fa;
            position: relative;
            overflow: hidden;
        }

        .viz-timeline {
            width: 100%;
            height: 100%;
        }

        .nav-controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-button {
            padding: 6px 12px;
            border: 1px solid #d0d7de;
            border-radius: 4px;
            background: white;
            color: #24292f;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            z-index: 100;
        }

        .nav-button:hover {
            background: #f6f8fa;
            border-color: #0969da;
        }

        .nav-button.active {
            background: #0969da;
            color: white;
            border-color: #0969da;
        }

        .main-content {
            display: flex;
            flex: 1;
            min-height: 0;
        }

        /* Left Panel - Thread Tree */
        .thread-panel {
            width: 350px;
            min-width: 300px;
            background: white;
            border-right: 1px solid #e0e4e7;
            display: flex;
            flex-direction: column;
        }

        .thread-header {
            padding: 16px;
            border-bottom: 1px solid #e0e4e7;
            background: #f8f9fa;
        }

        .thread-search {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            font-size: 14px;
            background: white;
        }

        .thread-tree {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .thread-node {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            margin: 2px 0;
            border-radius: 6px;
            cursor: pointer;
            position: relative;
            transition: background-color 0.2s;
        }

        .thread-node:hover {
            background: #f6f8fa;
        }

        .thread-node.selected {
            background: #0969da;
            color: white;
        }

        .thread-node.unrated {
            border-left: 3px solid #fd7e14;
        }

        .thread-node.rated {
            border-left: 3px solid #198754;
        }

        .node-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #6f42c1;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            margin-right: 8px;
        }

        .node-content {
            flex: 1;
            min-width: 0;
        }

        .node-sender {
            font-size: 12px;
            font-weight: 600;
            color: #24292f;
        }

        .thread-node.selected .node-sender {
            color: white;
        }

        .node-subject {
            font-size: 11px;
            color: #656d76;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .thread-node.selected .node-subject {
            color: rgba(255,255,255,0.8);
        }

        .node-badges {
            display: flex;
            gap: 4px;
            margin-left: 8px;
        }

        .badge {
            width: 16px;
            height: 16px;
            border-radius: 3px;
            font-size: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .badge.attachment {
            background: #0969da;
        }

        .badge.forward {
            background: #8250df;
        }

        .badge.reply-all {
            background: #1f883d;
        }

        /* Center Panel - Message View */
        .message-panel {
            flex: 1;
            background: white;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #e0e4e7;
        }

        .message-header {
            padding: 16px;
            border-bottom: 1px solid #e0e4e7;
            background: #f8f9fa;
        }

        .message-subject {
            font-size: 18px;
            font-weight: 600;
            color: #24292f;
            margin-bottom: 8px;
        }

        .message-meta {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #656d76;
        }

        .message-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .email-headers {
            background: #f6f8fa;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 16px;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
            font-size: 12px;
        }

        .header-row {
            display: flex;
            margin-bottom: 4px;
        }

        .header-label {
            font-weight: 600;
            width: 80px;
            color: #656d76;
        }

        .header-value {
            flex: 1;
            color: #24292f;
        }

        .message-body {
            line-height: 1.6;
            color: #24292f;
        }

        .quote-block {
            border-left: 3px solid #d0d7de;
            padding-left: 16px;
            margin: 16px 0;
            color: #656d76;
        }

        .attachment-list {
            border: 1px solid #d0d7de;
            border-radius: 6px;
            padding: 12px;
            margin: 16px 0;
            background: #f6f8fa;
        }

        .attachment-item {
            display: flex;
            align-items: center;
            padding: 8px;
            margin: 4px 0;
            background: white;
            border-radius: 4px;
            cursor: pointer;
        }

        .attachment-icon {
            width: 20px;
            height: 20px;
            background: #0969da;
            color: white;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            margin-right: 8px;
        }

        /* Right Panel - Rating Panel */
        .rating-panel {
            width: 320px;
            min-width: 280px;
            background: white;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .rating-section {
            padding: 16px;
            border-bottom: 1px solid #e0e4e7;
        }

        .rating-title {
            font-size: 14px;
            font-weight: 600;
            color: #24292f;
            margin-bottom: 12px;
        }

        .rating-options {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .rating-button {
            padding: 6px 12px;
            border: 1px solid #d0d7de;
            border-radius: 20px;
            background: white;
            color: #24292f;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .rating-button:hover {
            background: #f6f8fa;
        }

        .rating-button.selected {
            background: #0969da;
            color: white;
            border-color: #0969da;
        }

        .rating-note {
            width: 100%;
            min-height: 60px;
            padding: 8px;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            font-size: 12px;
            resize: vertical;
        }

        .rating-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #d0d7de;
            background: white;
            color: #24292f;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #f6f8fa;
        }

        .btn-primary {
            background: #0969da;
            color: white;
            border-color: #0969da;
        }

        .btn-primary:hover {
            background: #0860ca;
        }

        /* Navigation shortcuts overlay */
        .shortcuts-help {
            position: fixed;
            top: 16px;
            right: 16px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px;
            border-radius: 6px;
            font-size: 11px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .shortcuts-help.visible {
            opacity: 1;
        }

        .shortcut-row {
            display: flex;
            justify-content: space-between;
            margin: 2px 0;
        }

        .shortcut-key {
            background: rgba(255,255,255,0.2);
            padding: 2px 6px;
            border-radius: 3px;
            margin-right: 8px;
        }

        /* Focus indicators for accessibility */
        .thread-node:focus,
        .rating-button:focus,
        .btn:focus,
        .thread-search:focus {
            outline: 2px solid #0969da;
            outline-offset: 2px;
        }

        /* Status indicators */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: #656d76;
        }

        .error {
            background: #f85149;
            color: white;
            padding: 12px;
            border-radius: 6px;
            margin: 8px;
        }

        /* Performance indicator */
        .perf-indicator {
            position: fixed;
            bottom: 16px;
            left: 16px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 11px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // Rating schema as per spec
        const DEFAULT_RATING_SCHEMA = {
            version: "1.0.0",
            messageOptions: [
                { key: "relevant", label: "Relevant", color: "#198754", severity: 70 },
                { key: "irrelevant", label: "Irrelevant", color: "#6c757d", severity: 10, exclusiveGroup: "relevance" },
                { key: "privileged", label: "Privileged", color: "#dc3545", severity: 90, requiresNote: true },
                { key: "confidential", label: "Confidential", color: "#fd7e14", severity: 80 },
                { key: "responsive", label: "Responsive", color: "#0dcaf0", severity: 60 }
            ],
            threadOptions: [
                { key: "hot", label: "Hot", color: "#dc3545", severity: 100 },
                { key: "review_complete", label: "Review Complete", color: "#198754", severity: 50 }
            ],
            rollupPolicy: {
                mode: "maxSeverity",
                rules: [
                    { ifAny: ["privileged"], thenThread: "privileged" },
                    { ifAny: ["relevant"], thenThread: "relevant" }
                ]
            }
        };

        // Sample thread data
        const SAMPLE_THREAD_DATA = {
            threadId: "ALPHA-2024-001",
            subject: "Project Alpha Budget Discussion",
            messages: [
                {
                    messageId: "msg001",
                    from: "john.smith@company.com",
                    to: ["team@company.com"],
                    cc: [],
                    subject: "Project Alpha Budget Discussion",
                    date: "2024-01-15T10:00:00Z",
                    hasAttachments: true,
                    parentMessageId: null,
                    body: `Team,

I wanted to start a discussion about the budget allocation for Project Alpha. We need to review the current projections and make some adjustments.

Key points to consider:
- Development costs have increased by 15%
- Timeline has been extended to Q3
- Resource allocation needs review

Please review the attached budget spreadsheet and provide your feedback.

Best regards,
John`,
                    attachments: [
                        { name: "budget_q1_2024.xlsx", type: "application/xlsx", size: 45621 },
                        { name: "timeline_updated.pdf", type: "application/pdf", size: 128304 }
                    ]
                },
                {
                    messageId: "msg002",
                    from: "sarah.johnson@company.com",
                    to: ["john.smith@company.com", "team@company.com"],
                    cc: [],
                    subject: "Re: Project Alpha Budget Discussion",
                    date: "2024-01-15T14:30:00Z",
                    hasAttachments: false,
                    parentMessageId: "msg001",
                    body: `John,

Thanks for sharing the budget details. I've reviewed the spreadsheet and have a few concerns:

1. The development cost increase seems higher than expected
2. We should consider reallocating some resources from Phase 2
3. The timeline extension might affect our Q4 deliverables

I think we need a deeper dive into the development costs. Can we schedule a meeting this week?

Sarah`
                },
                {
                    messageId: "msg003",
                    from: "mike.wilson@company.com",
                    to: ["john.smith@company.com", "sarah.johnson@company.com", "team@company.com"],
                    cc: [],
                    subject: "Re: Project Alpha Budget Discussion",
                    date: "2024-01-15T16:45:00Z",
                    hasAttachments: true,
                    parentMessageId: "msg002",
                    body: `Team,

I agree with Sarah's points. The development cost increase is concerning, but I think it's justified given the scope changes we discussed last month.

Attached is a revised resource allocation proposal that might help address the budget constraints while maintaining our timeline.

Key changes:
- Reduce Phase 2 team size by 2 FTE
- Extend Phase 1 by 3 weeks
- Defer some non-critical features to Phase 3

Let me know your thoughts.

Mike`,
                    attachments: [
                        { name: "revised_allocation.docx", type: "application/docx", size: 78945 }
                    ]
                }
            ]
        };

        // Timeline Visualization Component
        function TimelineVisualization({ threadData, selectedMessageId, onSelectMessage, viewMode }) {
            const svgRef = useRef();

            useEffect(() => {
                if (!threadData || !svgRef.current) return;

                const svg = d3.select(svgRef.current);
                svg.selectAll("*").remove();

                const width = svgRef.current.clientWidth;
                const height = 80;
                const margin = { top: 10, right: 20, bottom: 20, left: 20 };

                // Create timeline data
                const messages = threadData.messages.map(msg => ({
                    ...msg,
                    date: new Date(msg.date),
                    x: 0,
                    y: height / 2
                }));

                // Set up scales
                const xScale = d3.scaleTime()
                    .domain(d3.extent(messages, d => d.date))
                    .range([margin.left, width - margin.right]);

                const yScale = d3.scaleLinear()
                    .domain([0, messages.length])
                    .range([margin.top, height - margin.bottom]);

                // Position messages
                messages.forEach((msg, i) => {
                    msg.x = xScale(msg.date);
                    msg.y = viewMode === 'timeline' ? height / 2 : yScale(i);
                });

                // Draw timeline axis
                if (viewMode === 'timeline') {
                    const xAxis = d3.axisBottom(xScale)
                        .tickSize(4)
                        .tickFormat(d3.timeFormat("%m/%d"));

                    svg.append("g")
                        .attr("transform", `translate(0, ${height - margin.bottom})`)
                        .call(xAxis)
                        .selectAll("text")
                        .style("font-size", "10px")
                        .style("fill", "#656d76");

                    // Draw timeline line
                    svg.append("line")
                        .attr("x1", margin.left)
                        .attr("x2", width - margin.right)
                        .attr("y1", height / 2)
                        .attr("y2", height / 2)
                        .attr("stroke", "#d0d7de")
                        .attr("stroke-width", 2);
                }

                // Draw connections for tree view
                if (viewMode === 'tree' && messages.length > 1) {
                    const connections = [];
                    messages.forEach(msg => {
                        if (msg.parentMessageId) {
                            const parent = messages.find(m => m.messageId === msg.parentMessageId);
                            if (parent) {
                                connections.push({ source: parent, target: msg });
                            }
                        }
                    });

                    svg.selectAll(".connection")
                        .data(connections)
                        .enter()
                        .append("path")
                        .attr("class", "connection")
                        .attr("d", d => {
                            const midX = (d.source.x + d.target.x) / 2;
                            return `M${d.source.x},${d.source.y} Q${midX},${d.source.y - 15} ${d.target.x},${d.target.y}`;
                        })
                        .attr("stroke", "#8250df")
                        .attr("stroke-width", 1.5)
                        .attr("fill", "none")
                        .attr("opacity", 0.6);
                }

                // Draw message nodes
                const nodes = svg.selectAll(".message-node")
                    .data(messages)
                    .enter()
                    .append("g")
                    .attr("class", "message-node")
                    .attr("transform", d => `translate(${d.x}, ${d.y})`)
                    .style("cursor", "pointer")
                    .on("click", (event, d) => onSelectMessage(d.messageId));

                // Message circles
                nodes.append("circle")
                    .attr("r", d => selectedMessageId === d.messageId ? 8 : 6)
                    .attr("fill", d => {
                        if (selectedMessageId === d.messageId) return "#0969da";
                        if (d.hasAttachments) return "#fd7e14";
                        return "#6f42c1";
                    })
                    .attr("stroke", "white")
                    .attr("stroke-width", 2);

                // Sender initials
                nodes.append("text")
                    .text(d => {
                        const initials = d.from.split('@')[0]
                            .split('.')
                            .map(part => part[0])
                            .join('')
                            .toUpperCase()
                            .substring(0, 2);
                        return initials;
                    })
                    .attr("text-anchor", "middle")
                    .attr("dy", "0.35em")
                    .attr("font-size", "8px")
                    .attr("font-weight", "bold")
                    .attr("fill", "white");

                // Hover tooltips
                nodes.append("title")
                    .text(d => `${d.from}\n${d.subject}\n${new Date(d.date).toLocaleString()}`);

            }, [threadData, selectedMessageId, viewMode]);

            return (
                <svg
                    ref={svgRef}
                    className="viz-timeline"
                    width="100%"
                    height="100%"
                />
            );
        }

        // Top Navigator Component
        function TopNavigator({ threadData, selectedMessageId, onSelectMessage }) {
            const [viewMode, setViewMode] = useState('timeline');

            return (
                <div className="top-navigator">
                    <div>
                        <div className="nav-title">Email Thread Navigator</div>
                        <div className="nav-subtitle">
                            Thread: {threadData.threadId} • {threadData.messages.length} messages
                        </div>
                    </div>

                    <div className="visualization-container">
                        <TimelineVisualization
                            threadData={threadData}
                            selectedMessageId={selectedMessageId}
                            onSelectMessage={onSelectMessage}
                            viewMode={viewMode}
                        />
                    </div>

                    <div className="nav-controls">
                        <button
                            className={`nav-button ${viewMode === 'timeline' ? 'active' : ''}`}
                            onClick={() => setViewMode('timeline')}
                        >
                            Timeline
                        </button>
                        <button
                            className={`nav-button ${viewMode === 'tree' ? 'active' : ''}`}
                            onClick={() => setViewMode('tree')}
                        >
                            Tree
                        </button>
                        <button
                            className="nav-button"
                            onClick={() => window.location.reload()}
                        >
                            Refresh
                        </button>
                    </div>
                </div>
            );
        }

        // Rating Panel Component
        function RatingPanel({ schema, messageRating, threadRating, onChangeMessage, onChangeThread, autoAdvance }) {
            const [currentMessageRating, setCurrentMessageRating] = useState(messageRating);
            const [currentThreadRating, setCurrentThreadRating] = useState(threadRating);

            useEffect(() => {
                setCurrentMessageRating(messageRating);
            }, [messageRating]);

            useEffect(() => {
                setCurrentThreadRating(threadRating);
            }, [threadRating]);

            const toggleMessageRating = (key) => {
                const option = schema.messageOptions.find(opt => opt.key === key);
                let newSelected = new Set(currentMessageRating.selected);

                // Handle exclusive groups
                if (option?.exclusiveGroup) {
                    schema.messageOptions
                        .filter(opt => opt.exclusiveGroup === option.exclusiveGroup)
                        .forEach(opt => newSelected.delete(opt.key));
                }

                if (newSelected.has(key)) {
                    newSelected.delete(key);
                } else {
                    newSelected.add(key);
                }

                setCurrentMessageRating({
                    ...currentMessageRating,
                    selected: Array.from(newSelected)
                });
            };

            const toggleThreadRating = (key) => {
                const option = (schema.threadOptions || schema.messageOptions).find(opt => opt.key === key);
                let newSelected = new Set(currentThreadRating.selected);

                // Handle exclusive groups
                if (option?.exclusiveGroup) {
                    (schema.threadOptions || schema.messageOptions)
                        .filter(opt => opt.exclusiveGroup === option.exclusiveGroup)
                        .forEach(opt => newSelected.delete(opt.key));
                }

                if (newSelected.has(key)) {
                    newSelected.delete(key);
                } else {
                    newSelected.add(key);
                }

                setCurrentThreadRating({
                    ...currentThreadRating,
                    selected: Array.from(newSelected),
                    source: "override"
                });
            };

            const saveAndNext = () => {
                // Check if note is required
                const requiresNote = currentMessageRating.selected.some(key =>
                    schema.messageOptions.find(opt => opt.key === key)?.requiresNote
                );

                if (requiresNote && !currentMessageRating.note) {
                    alert("Please add a note for this rating.");
                    return;
                }

                // Save ratings
                onChangeMessage({
                    ...currentMessageRating,
                    version: currentMessageRating.version + 1,
                    updatedAt: new Date().toISOString(),
                    updatedBy: "current_user"
                });

                onChangeThread(currentThreadRating);

                // Auto-advance to next unrated
                if (autoAdvance) {
                    autoAdvance();
                }
            };

            return (
                <div className="rating-panel">
                    {/* Thread Rating Section */}
                    <div className="rating-section">
                        <div className="rating-title">Thread Rating</div>
                        <div className="rating-options">
                            {(schema.threadOptions || schema.messageOptions).map(option => (
                                <button
                                    key={option.key}
                                    className={`rating-button ${currentThreadRating.selected.includes(option.key) ? 'selected' : ''}`}
                                    onClick={() => toggleThreadRating(option.key)}
                                    title={option.description}
                                >
                                    {option.label}
                                </button>
                            ))}
                        </div>
                        <textarea
                            className="rating-note"
                            placeholder="Thread note (optional)"
                            value={currentThreadRating.note || ''}
                            onChange={(e) => setCurrentThreadRating({
                                ...currentThreadRating,
                                note: e.target.value,
                                source: "override"
                            })}
                        />
                    </div>

                    {/* Message Rating Section */}
                    <div className="rating-section">
                        <div className="rating-title">Message Rating</div>
                        <div className="rating-options">
                            {schema.messageOptions.map(option => (
                                <button
                                    key={option.key}
                                    className={`rating-button ${currentMessageRating.selected.includes(option.key) ? 'selected' : ''}`}
                                    onClick={() => toggleMessageRating(option.key)}
                                    title={option.description}
                                >
                                    {option.label}
                                </button>
                            ))}
                        </div>
                        <textarea
                            className="rating-note"
                            placeholder="Note (required for some ratings)"
                            value={currentMessageRating.note || ''}
                            onChange={(e) => setCurrentMessageRating({
                                ...currentMessageRating,
                                note: e.target.value
                            })}
                        />
                        <div className="rating-actions">
                            <button className="btn btn-primary" onClick={saveAndNext}>
                                Save & Next
                            </button>
                            <button className="btn" onClick={() => window.location.reload()}>
                                Reset
                            </button>
                        </div>
                    </div>

                    {/* Navigation Help */}
                    <div className="rating-section">
                        <div className="rating-title">Keyboard Shortcuts</div>
                        <div style={{fontSize: '11px', color: '#656d76'}}>
                            <div>↑/↓ - Navigate messages</div>
                            <div>←/→ - Expand/collapse thread</div>
                            <div>Space/Enter - Open message</div>
                            <div>N - Next unrated</div>
                            <div>Shift+N - Previous unrated</div>
                            <div>/ - Search</div>
                        </div>
                    </div>
                </div>
            );
        }

        // Thread Tree Component
        function ThreadTree({ threadData, selectedMessageId, onSelectMessage, ratings, searchQuery }) {
            const [expandedNodes, setExpandedNodes] = useState(new Set(['msg001']));

            const toggleExpanded = (messageId) => {
                const newExpanded = new Set(expandedNodes);
                if (newExpanded.has(messageId)) {
                    newExpanded.delete(messageId);
                } else {
                    newExpanded.add(messageId);
                }
                setExpandedNodes(newExpanded);
            };

            const getChildMessages = (parentId) => {
                return threadData.messages.filter(msg => msg.parentMessageId === parentId);
            };

            const renderMessage = (message, depth = 0) => {
                const hasChildren = getChildMessages(message.messageId).length > 0;
                const isExpanded = expandedNodes.has(message.messageId);
                const isSelected = selectedMessageId === message.messageId;
                const messageRating = ratings.messages[message.messageId];
                const isRated = messageRating && messageRating.selected.length > 0;

                // Filter by search query
                if (searchQuery && !message.from.toLowerCase().includes(searchQuery.toLowerCase()) &&
                    !message.subject.toLowerCase().includes(searchQuery.toLowerCase())) {
                    return null;
                }

                const senderInitials = message.from.split('@')[0]
                    .split('.')
                    .map(part => part[0])
                    .join('')
                    .toUpperCase()
                    .substring(0, 2);

                return (
                    <div key={message.messageId}>
                        <div
                            className={`thread-node ${isSelected ? 'selected' : ''} ${isRated ? 'rated' : 'unrated'}`}
                            style={{paddingLeft: `${depth * 20 + 12}px`}}
                            onClick={() => onSelectMessage(message.messageId)}
                            tabIndex={0}
                            role="treeitem"
                            aria-selected={isSelected}
                            aria-expanded={hasChildren ? isExpanded : undefined}
                        >
                            {hasChildren && (
                                <span
                                    style={{
                                        marginRight: '4px',
                                        cursor: 'pointer',
                                        userSelect: 'none'
                                    }}
                                    onClick={(e) => {
                                        e.stopPropagation();
                                        toggleExpanded(message.messageId);
                                    }}
                                >
                                    {isExpanded ? '▼' : '▶'}
                                </span>
                            )}

                            <div className="node-avatar" style={{backgroundColor: `hsl(${message.messageId.charCodeAt(3) * 30}, 60%, 50%)`}}>
                                {senderInitials}
                            </div>

                            <div className="node-content">
                                <div className="node-sender">
                                    {message.from.split('@')[0].replace('.', ' ')}
                                </div>
                                <div className="node-subject">
                                    {new Date(message.date).toLocaleDateString()} - {message.subject}
                                </div>
                            </div>

                            <div className="node-badges">
                                {message.hasAttachments && (
                                    <div className="badge attachment" title="Has attachments">📎</div>
                                )}
                                {message.cc && message.cc.length > 0 && (
                                    <div className="badge reply-all" title="Reply all">👥</div>
                                )}
                            </div>
                        </div>

                        {hasChildren && isExpanded && (
                            <div>
                                {getChildMessages(message.messageId).map(child =>
                                    renderMessage(child, depth + 1)
                                )}
                            </div>
                        )}
                    </div>
                );
            };

            const rootMessages = threadData.messages.filter(msg => !msg.parentMessageId);

            return (
                <div className="thread-tree" role="tree" aria-label="Email thread tree">
                    {rootMessages.map(message => renderMessage(message))}
                </div>
            );
        }

        // Message View Component
        function MessageView({ message, threadData }) {
            if (!message) {
                return (
                    <div className="loading">
                        Select a message to view details
                    </div>
                );
            }

            const formatEmailAddress = (email) => {
                if (email.includes('@')) {
                    const [name, domain] = email.split('@');
                    return `${name.replace('.', ' ')} <${email}>`;
                }
                return email;
            };

            return (
                <div className="message-content">
                    <div className="email-headers">
                        <div className="header-row">
                            <div className="header-label">From:</div>
                            <div className="header-value">{formatEmailAddress(message.from)}</div>
                        </div>
                        <div className="header-row">
                            <div className="header-label">To:</div>
                            <div className="header-value">
                                {message.to.map(formatEmailAddress).join(', ')}
                            </div>
                        </div>
                        {message.cc && message.cc.length > 0 && (
                            <div className="header-row">
                                <div className="header-label">CC:</div>
                                <div className="header-value">
                                    {message.cc.map(formatEmailAddress).join(', ')}
                                </div>
                            </div>
                        )}
                        <div className="header-row">
                            <div className="header-label">Date:</div>
                            <div className="header-value">
                                {new Date(message.date).toLocaleString()}
                            </div>
                        </div>
                        <div className="header-row">
                            <div className="header-label">Subject:</div>
                            <div className="header-value">{message.subject}</div>
                        </div>
                    </div>

                    {message.attachments && message.attachments.length > 0 && (
                        <div className="attachment-list">
                            <strong>Attachments ({message.attachments.length})</strong>
                            {message.attachments.map((attachment, index) => (
                                <div key={index} className="attachment-item">
                                    <div className="attachment-icon">
                                        {attachment.type.includes('pdf') ? '📄' :
                                         attachment.type.includes('image') ? '🖼' :
                                         attachment.type.includes('sheet') || attachment.type.includes('excel') ? '📊' :
                                         attachment.type.includes('word') || attachment.type.includes('doc') ? '📝' : '📎'}
                                    </div>
                                    <div>
                                        <div style={{fontWeight: '500'}}>{attachment.name}</div>
                                        <div style={{fontSize: '11px', color: '#656d76'}}>
                                            {(attachment.size / 1024).toFixed(1)} KB
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    <div className="message-body">
                        {message.body.split('\n').map((line, index) => {
                            if (line.startsWith('>')) {
                                return (
                                    <div key={index} className="quote-block">
                                        {line.substring(1).trim()}
                                    </div>
                                );
                            }
                            return <div key={index}>{line || <br />}</div>;
                        })}
                    </div>
                </div>
            );
        }

        // Main App Component
        function EmailThreadNavigator() {
            const [threadData] = useState(SAMPLE_THREAD_DATA);
            const [selectedMessageId, setSelectedMessageId] = useState('msg001');
            const [searchQuery, setSearchQuery] = useState('');
            const [showShortcuts, setShowShortcuts] = useState(false);
            const [performanceMetrics, setPerformanceMetrics] = useState({ renderTime: 0 });

            // Rating state
            const [ratings, setRatings] = useState({
                messages: {
                    'msg001': { messageId: 'msg001', selected: [], note: '', version: 1, updatedBy: '', updatedAt: '' },
                    'msg002': { messageId: 'msg002', selected: [], note: '', version: 1, updatedBy: '', updatedAt: '' },
                    'msg003': { messageId: 'msg003', selected: [], note: '', version: 1, updatedBy: '', updatedAt: '' }
                },
                thread: { threadId: threadData.threadId, selected: [], source: 'computed', note: '' }
            });

            const selectedMessage = threadData.messages.find(msg => msg.messageId === selectedMessageId);
            const currentMessageRating = ratings.messages[selectedMessageId] ||
                { messageId: selectedMessageId, selected: [], note: '', version: 1, updatedBy: '', updatedAt: '' };

            // Performance measurement
            useEffect(() => {
                const start = performance.now();
                // Simulate tree rendering
                setTimeout(() => {
                    const end = performance.now();
                    setPerformanceMetrics({ renderTime: end - start });
                }, 0);
            }, [threadData, selectedMessageId]);

            // Keyboard navigation
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                        return;
                    }

                    switch (e.key) {
                        case 'ArrowUp':
                            e.preventDefault();
                            navigateMessages(-1);
                            break;
                        case 'ArrowDown':
                            e.preventDefault();
                            navigateMessages(1);
                            break;
                        case 'n':
                            if (e.shiftKey) {
                                navigateToUnrated(-1);
                            } else {
                                navigateToUnrated(1);
                            }
                            break;
                        case '/':
                            e.preventDefault();
                            document.querySelector('.thread-search').focus();
                            break;
                        case '?':
                            e.preventDefault();
                            setShowShortcuts(!showShortcuts);
                            break;
                        case 'Escape':
                            setShowShortcuts(false);
                            break;
                    }
                };

                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [selectedMessageId, ratings]);

            const navigateMessages = (direction) => {
                const messageIds = threadData.messages.map(msg => msg.messageId);
                const currentIndex = messageIds.indexOf(selectedMessageId);
                const newIndex = Math.max(0, Math.min(messageIds.length - 1, currentIndex + direction));
                setSelectedMessageId(messageIds[newIndex]);
            };

            const navigateToUnrated = (direction) => {
                const unratedMessages = threadData.messages.filter(msg => {
                    const rating = ratings.messages[msg.messageId];
                    return !rating || rating.selected.length === 0;
                });

                if (unratedMessages.length === 0) return;

                const currentIndex = unratedMessages.findIndex(msg => msg.messageId === selectedMessageId);
                let newIndex;

                if (currentIndex === -1) {
                    newIndex = direction > 0 ? 0 : unratedMessages.length - 1;
                } else {
                    newIndex = direction > 0
                        ? (currentIndex + 1) % unratedMessages.length
                        : (currentIndex - 1 + unratedMessages.length) % unratedMessages.length;
                }

                setSelectedMessageId(unratedMessages[newIndex].messageId);
            };

            const handleMessageRatingChange = (newRating) => {
                setRatings(prev => ({
                    ...prev,
                    messages: {
                        ...prev.messages,
                        [selectedMessageId]: newRating
                    }
                }));
            };

            const handleThreadRatingChange = (newRating) => {
                setRatings(prev => ({
                    ...prev,
                    thread: newRating
                }));
            };

            const autoAdvanceToNext = () => {
                navigateToUnrated(1);
            };

            return (
                <div className="app-container">
                    {/* Top Navigator with Visualization */}
                    <TopNavigator
                        threadData={threadData}
                        selectedMessageId={selectedMessageId}
                        onSelectMessage={setSelectedMessageId}
                    />

                    {/* Main Content Area */}
                    <div className="main-content">
                        {/* Left Panel - Thread Tree */}
                        <div className="thread-panel">
                        <div className="thread-header">
                            <input
                                type="text"
                                className="thread-search"
                                placeholder="Search messages... (Press / to focus)"
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                                aria-label="Search messages"
                            />
                        </div>
                        <ThreadTree
                            threadData={threadData}
                            selectedMessageId={selectedMessageId}
                            onSelectMessage={setSelectedMessageId}
                            ratings={ratings}
                            searchQuery={searchQuery}
                        />
                    </div>

                    {/* Center Panel - Message View */}
                    <div className="message-panel">
                        <div className="message-header">
                            <div className="message-subject">{threadData.subject}</div>
                            <div className="message-meta">
                                <span>Thread: {threadData.threadId}</span>
                                <span>{threadData.messages.length} messages</span>
                            </div>
                        </div>
                        <MessageView
                            message={selectedMessage}
                            threadData={threadData}
                        />
                    </div>

                        {/* Right Panel - Rating Panel */}
                        <RatingPanel
                        schema={DEFAULT_RATING_SCHEMA}
                        messageRating={currentMessageRating}
                        threadRating={ratings.thread}
                        onChangeMessage={handleMessageRatingChange}
                        onChangeThread={handleThreadRatingChange}
                        autoAdvance={autoAdvanceToNext}
                        />
                    </div>

                    {/* Keyboard Shortcuts Help */}
                    <div className={`shortcuts-help ${showShortcuts ? 'visible' : ''}`}>
                        <div className="shortcut-row">
                            <span className="shortcut-key">↑/↓</span>
                            <span>Navigate messages</span>
                        </div>
                        <div className="shortcut-row">
                            <span className="shortcut-key">N</span>
                            <span>Next unrated</span>
                        </div>
                        <div className="shortcut-row">
                            <span className="shortcut-key">Shift+N</span>
                            <span>Previous unrated</span>
                        </div>
                        <div className="shortcut-row">
                            <span className="shortcut-key">/</span>
                            <span>Search</span>
                        </div>
                        <div className="shortcut-row">
                            <span className="shortcut-key">?</span>
                            <span>Toggle help</span>
                        </div>
                    </div>

                    {/* Performance Indicator */}
                    <div className="perf-indicator">
                        Render: {performanceMetrics.renderTime.toFixed(1)}ms
                        {performanceMetrics.renderTime > 200 && ' ⚠️'}
                    </div>
                </div>
            );
        }

        // Render the app
        ReactDOM.render(<EmailThreadNavigator />, document.getElementById('root'));
    </script>
</body>
</html>
